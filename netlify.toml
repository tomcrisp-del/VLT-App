# ── Secrets scanning ────────────────────────────────────────────────
# The Firebase Web API key is PUBLIC by design — it ships in client-side
# JS for every visitor, and security is enforced by Firestore rules + Auth
# (not by hiding the key). Netlify's smart scanner flags the "AIza…"
# pattern anyway, so we tell it this specific value is expected. No real
# secret (API secret, private key, etc.) lives in this repo.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyA7pGNhM6aX96v5A34EFZnV4UnV6056jGE"

# ── Caching strategy ────────────────────────────────────────────────
# HTML is always revalidated so phones pick up new deploys immediately.
# Everything the HTML points at is cached for speed:
#   • CSS/JS carry a ?v= query string, so bumping it forces a fresh fetch
#     regardless of cache → safe to cache for a year.
#   • Photos / trail (KML) / PDFs change rarely and are referenced by plain
#     filename, so we cache them for 1 day: fast repeat loads, and any swap
#     using the same filename refreshes within a day on its own.

# index.html — never go stale.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Versioned code — cache hard (the ?v= query busts it on change).
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Trail photos, KML overlays, and PDFs — cache 1 day for fast loads.
[[headers]]
  for = "/Properties/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/Logos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"
